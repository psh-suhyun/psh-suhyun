# 비공개 커밋을 카드에 반영하려면 저장소 Secrets에 STATS_PAT 추가
# (Classic PAT: repo + read:user 권한 권장). 없으면 GITHUB_TOKEN으로 공개 데이터만 반영됩니다.
name: Update GitHub stats SVGs

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-github-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=github_dark&include_all_commits=true&count_private=true&hide_border=true&hide_title=true"
          path: assets/github-stats/stats.svg
          token: ${{ secrets.STATS_PAT || secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=github_dark&hide_border=true&hide_title=true"
          path: assets/github-stats/top-langs.svg
          token: ${{ secrets.STATS_PAT || secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats/*.svg
          if git diff --staged --quiet; then
            echo "No SVG changes."
            exit 0
          fi
          git commit -m "chore: update GitHub stats SVGs"
          git push
